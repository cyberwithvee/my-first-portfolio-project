<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="styles.css">
    <title>ExpenseTracker Mobile</title>
</head>
<body>
    <div class="mobile-frame">
        <header class="app-header">
            <span class="logo">⚡ QuickLog</span>
        </header>

        <main class="mobile-content">
            <div class="balance-banner">
                <span>Quick Spend Today</span>
                <h1 id="mobile-today-total">$0.00</h1>
            </div>

            <form id="expense-form" class="quick-form">
                <div class="input-group">
                    <label for="amount">Amount ($)</label>
                    <input type="number" id="amount" placeholder="0.00" step="0.01" required>
                </div>

                <div class="input-group">
                    <label for="desc">Description</label>
                    <input type="text" id="desc" placeholder="e.g., Coffee, Gas" required>
                </div>

                <div class="input-group">
                    <label for="category">Category</label>
                    <select id="category">
                        <option value="Food & Drinks">Food & Drinks</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                    </select>
                </div>

                <button type="submit" class="btn-submit">Log Expense</button>
            </form>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
